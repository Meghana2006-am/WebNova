
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Raksha Saheli - Your Safety Companion</title>
    
    <!-- Leaflet CSS for maps (FREE - no API key needed) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Your CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Raksha Saheli</h1>
            <p>Your Safety, One Command Away</p>
        </header>

        <!-- Main Controls -->
        <div class="controls">
            <button id="sosBtn" class="sos-button">🚨 EMERGENCY SOS 🚨</button>
            <button id="voiceBtn" class="voice-button">🎤 Voice Command</button>
            <button id="locationBtn" class="location-button">📍 Share Live Location</button>
            <button id="policeBtn" class="police-button">🚔 Find Nearby Police</button>
        </div>

        <!-- Voice Status -->
        <div id="voiceStatus" class="voice-status">
            💬 Click the mic and say: "SOS", "Find police", or "Share location"
        </div>

        <!-- Map Container -->
        <div id="map" class="map-container"></div>

        <!-- Police Information -->
        <div id="policeStatus" class="info-card"></div>
        <div id="nearestPoliceInfo" class="info-card"></div>
        <div id="allPoliceStations" class="stations-list"></div>

        <!-- SOS Message Display -->
        <div id="sosMessage" class="sos-message" style="display:none;"></div>

        <!-- Emergency Contacts -->
        <div class="emergency-contacts">
            <h3>📞 Emergency Numbers</h3>
            <ul>
                <li><strong>Police:</strong> 100</li>
                <li><strong>Women Helpline:</strong> 1091</li>
                <li><strong>Ambulance:</strong> 108</li>
                <li><strong>National Emergency:</strong> 112</li>
            </ul>
        </div>
    </div>

    <!-- Leaflet JS for maps -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Your JavaScript files -->
    <script src="script.js"></script>
    <script src="voiceRecognition.js"></script>
</body>
</html>
